<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ALGUM CREATIONS | PREMIUM BILLING</title>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --brand: #4f46e5;
            --brand-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --brand-soft: #f5f3ff;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-soft: #64748b;
            --border: #e2e8f0;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-soft: #94a3b8;
            --border: #334155;
            --brand-soft: rgba(99, 102, 241, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }

        .app-container {
            width: 100%; max-width: 850px; background: var(--card); border-radius: 32px;
            box-shadow: var(--shadow-lg); padding: 30px; border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { margin: 4px 0 0; color: var(--text-soft); font-size: 12px; font-weight: 600; }

        .section-label { font-size: 12px; font-weight: 800; color: var(--brand); text-transform: uppercase; margin: 25px 0 15px; display: flex; align-items: center; gap: 8px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; }
        
        input, select { padding: 14px; border-radius: 16px; border: 1.5px solid var(--border); font-size: 16px; outline: none; background: var(--card); color: var(--text); width: 100%; }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }

        .mobile-input-wrapper { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 16px; background: var(--card); overflow: hidden; }
        .mobile-prefix { background: var(--brand-soft); color: var(--brand); font-weight: 800; padding: 14px; border-right: 1.5px solid var(--border); }
        .mobile-input-wrapper input { border: none; }

        .btn-sync { background: var(--brand-gradient); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; height: 52px; width: 100%; }

        .item-row { display: grid; grid-template-columns: 2.5fr 0.8fr 0.8fr 48px; gap: 12px; margin-bottom: 15px; align-items: center; }
        .btn-remove { background: #fee2e2; color: var(--danger); border: none; height: 48px; border-radius: 14px; cursor: pointer; font-size: 20px; }

        .gst-toggle-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: var(--brand-soft); border-radius: 20px; border: 1px solid var(--brand); margin: 20px 0; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--brand-gradient); }
        input:checked + .slider:before { transform: translateX(22px); }

        .breakdown-card { background: #1e293b; color: white; border-radius: 24px; padding: 25px; margin: 30px 0; }
        .breakdown-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; opacity: 0.8; }
        .total-row { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px; padding-top: 15px; font-weight: 800; font-size: 28px; color: #fff; }

        .quick-pay-section { background: var(--card); border: 2px solid var(--border); padding: 25px; border-radius: 24px; margin: 30px 0; text-align: center; }
        #quickPayAmount { font-size: 32px; font-weight: 800; text-align: center; color: var(--brand); border: 2px solid var(--brand-soft); height: 80px; margin-bottom: 20px; border-radius: 20px; }

        .invoice-outer { margin-top: 40px; display: none; }
        .invoice-card { width: 750px; margin: 0 auto; background: white; padding: 50px; color: #0f172a; position: relative; border: 1px solid #e2e8f0; }
        .inv-badge { position: absolute; top: 40px; right: 50px; padding: 8px 20px; border-radius: 40px; font-size: 11px; font-weight: 900; }
        .badge-paid { background: #dcfce7; color: #15803d; }
        .badge-due { background: #fee2e2; color: #dc2626; }
        
        .inv-table { width: 100%; border-collapse: collapse; margin: 40px 0; }
        .inv-table th { background: #f8fafc; text-align: left; padding: 15px; font-size: 12px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        .inv-table td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }

        .btn-action { padding: 16px; border-radius: 18px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; }
        .btn-main { background: var(--brand-gradient); color: white; margin-top: 15px; }
        
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 16px; font-size: 14px; font-weight: 600; display: none; z-index: 10000; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; gap: 15px; }
            .item-row { grid-template-columns: 1fr 1fr 48px; gap: 10px; }
            .item-row input:first-child { grid-column: span 3; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="app-container">
    <div class="header">
        <div>
            <h1>ALGUM CREATIONS</h1>
            <p>DESIGN • BRANDING • SOLUTIONS</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="location.reload()" style="padding:10px; border-radius:12px; border:1px solid #ddd; background:white; cursor:pointer;">🗑️ Reset</button>
        </div>
    </div>

    <span class="section-label">1. Profile</span>
    <div class="grid">
        <div class="input-group">
            <label>Customer Mobile</label>
            <div class="mobile-input-wrapper">
                <span class="mobile-prefix">+91</span>
                <input type="tel" id="mobile" placeholder="XXXXXXXXXX" maxlength="10">
            </div>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="btn-sync" onclick="fetchClient()" id="fetchBtn">Sync Profile</button>
        </div>
    </div>
    <div id="clientDetails"></div>

    <div class="grid">
        <input type="text" id="customer" placeholder="Enter full name">
        <input type="date" id="billDate">
    </div>

    <span class="section-label">2. Order Details</span>
    <div id="itemsContainer"></div>
    <button onclick="addItemRow()" style="width:100%; padding:15px; border:2px dashed #ddd; border-radius:18px; background:none; cursor:pointer; color:#666; font-weight:bold; margin-top:10px;">+ Add Service</button>

    <div class="gst-toggle-card">
        <span style="font-weight:800; color:var(--brand);">APPLY GST (18%)</span>
        <label class="switch">
            <input type="checkbox" id="gstEnabled" onchange="updateCalculations()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="breakdown-card">
        <div class="breakdown-row"><span>Total:</span><span id="txtSubtotal">₹0.00</span></div>
        <div class="breakdown-row"><span>Tax:</span><span id="txtTax">₹0.00</span></div>
        <div class="breakdown-row"><span>Discount:</span><span id="txtDiscount">-₹0.00</span></div>
        <div class="total-row breakdown-row">
            <span>FINAL NET</span>
            <span id="txtGrandTotal">₹0.00</span>
        </div>
    </div>

    <div class="quick-pay-section">
        <input type="number" id="quickPayAmount" placeholder="Amount to Pay" oninput="updateCalculations()">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button onclick="generateQuickQR('part')" style="padding:15px; border-radius:15px; border:1px solid #ddd; cursor:pointer;">Generate QR</button>
            <button class="btn-action btn-main" style="margin:0;" onclick="generateQuickQR('full')">Full Pay</button>
        </div>
        <div id="quickQRContainer" style="margin-top: 25px;"></div>
    </div>

    <span class="section-label">3. Authorization</span>
    <div class="grid" style="grid-template-columns: 1fr 1fr 1.2fr;">
        <input type="number" id="discount" value="0" oninput="updateCalculations()">
        <input type="number" id="paidAmount" value="0" oninput="updateCalculations()">
        <select id="paymentMode">
            <option value="Online">UPI / Online</option>
            <option value="Cash">Cash</option>
        </select>
    </div>

    <button class="btn-action btn-main" onclick="generateInvoice()" style="height:60px; font-size:18px; margin-top:30px;">Generate Invoice</button>

    <div id="afterButtons" style="display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
        <button class="btn-action" style="background:#25d366; color:white;" onclick="shareWhatsApp()">WhatsApp</button>
        <button class="btn-action" style="background:#000; color:white;" onclick="downloadInvoice()">Save PNG</button>
    </div>

    <div id="invoiceArea" class="invoice-outer"></div>
    <datalist id="itemsData"></datalist>
</div>

<script>
    const UPI_ID = "tinu01jmp@oksbi";
    const SHEET_API = "https://script.google.com/macros/s/AKfycbz7L7LsHuTui703d62Yt4PO4Wtw69a4ALM-eVJqJmalwYcygLgq6EPPS8kuwRQNh28dcQ/exec";

    const inventory = [
        {name:"Classic Poster Design", price:499}, {name:"Premium Poster Design", price:799},
        {name:"Duo Business Pack (2 Designs)", price:1199}, {name:"Trio Growth Pack (3 Designs)", price:1799},
        {name:"Ultimate Branding Pack (4 Designs)", price:2399}, {name:"Classic Single Page Invitation", price:699},
        {name:"Luxury Single Page Invitation", price:999}, {name:"Grand 4-Page Wedding Invitation", price:1499},
        {name:"Additional Page (Invitation)", price:399}, {name:"Essential Logo Identity", price:1499},
        {name:"Elite Brand Logo Package", price:2999}, {name:"Single Page Menu", price:799},
        {name:"Double Page Menu", price:1299}, {name:"Banner / Flex Design (Per Feet)", price:79},
        {name:"Premium Social Post Design", price:399}
    ];

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function init() {
        document.getElementById('billDate').valueAsDate = new Date();
        const dl = document.getElementById('itemsData');
        inventory.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.name;
            dl.appendChild(opt);
        });
        addItemRow();
    }

    function addItemRow() {
        const container = document.getElementById('itemsContainer');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="text" list="itemsData" class="row-name" placeholder="Service..." oninput="handleAuto(this)">
            <input type="number" class="row-qty" value="1" oninput="updateCalculations()">
            <input type="number" class="row-rate" placeholder="Rate" oninput="updateCalculations()">
            <button class="btn-remove" onclick="this.parentElement.remove(); updateCalculations();">×</button>
        `;
        container.appendChild(row);
    }

    function handleAuto(input) {
        const match = inventory.find(i => i.name === input.value);
        if(match) {
            input.parentElement.querySelector('.row-rate').value = match.price;
            updateCalculations();
        }
    }

    function updateCalculations() {
        let subtotal = 0, totalTax = 0;
        const applyGst = document.getElementById('gstEnabled').checked;

        document.querySelectorAll('.item-row').forEach(row => {
            const q = parseFloat(row.querySelector('.row-qty').value) || 0;
            const r = parseFloat(row.querySelector('.row-rate').value) || 0;
            const lineAmt = q * r;
            subtotal += lineAmt;
            if(applyGst) totalTax += (lineAmt * 18) / 100;
        });

        const disc = parseFloat(document.getElementById('discount').value) || 0;
        const finalNet = Math.round(subtotal + totalTax - disc);

        document.getElementById('txtSubtotal').innerText = `₹${subtotal.toLocaleString()}`;
        document.getElementById('txtTax').innerText = `₹${totalTax.toLocaleString()}`;
        document.getElementById('txtDiscount').innerText = `-₹${disc.toLocaleString()}`;
        document.getElementById('txtGrandTotal').innerText = `₹${finalNet.toLocaleString()}`;

        if(document.activeElement.id === 'quickPayAmount') {
            document.getElementById('paidAmount').value = document.getElementById('quickPayAmount').value;
        }
        return { subtotal, totalTax, disc, finalNet };
    }

    function generateQuickQR(type) {
        const calc = updateCalculations();
        let amt = type === 'full' ? calc.finalNet : (parseFloat(document.getElementById('quickPayAmount').value) || 0);
        if(amt <= 0) return showToast("Enter amount");
        
        document.getElementById('paidAmount').value = amt;
        const upi = `upi://pay?pa=${UPI_ID}&pn=AlgumCreations&am=${amt.toFixed(2)}&cu=INR`;
        const cont = document.getElementById('quickQRContainer');
        cont.innerHTML = `<p style="font-weight:800; color:#4f46e5;">SCAN TO PAY ₹${amt}</p><div id="qQR" style="display:inline-block; padding:15px; background:white; border-radius:20px; border:1px solid #ddd;"></div>`;
        new QRCode(document.getElementById('qQR'), { text: upi, width: 140, height: 140 });
    }

    async function fetchClient() {
        let rawPhone = document.getElementById('mobile').value.replace(/\D/g,"");
        if(rawPhone.length < 10) return showToast("10 digits required");
        const btn = document.getElementById('fetchBtn');
        btn.innerText = "Syncing..."; btn.disabled = true;

        try {
            const res = await fetch(SHEET_API, { method: 'POST', body: JSON.stringify({ action: "getClient", phone: "91" + rawPhone }) });
            const data = await res.json();
            const div = document.getElementById('clientDetails');
            if(data.found) {
                div.innerHTML = `<div style="background:#f5f3ff; padding:20px; border-radius:20px; margin-bottom:20px;"><b>${data.name}</b><br><span style="color:#ef4444">PAST DUE: ₹${data.totalDue}</span></div>`;
                document.getElementById('customer').value = data.name;
                showToast("Synced!");
            } else {
                div.innerHTML = `<p style="margin-bottom:20px; font-size:12px;">New customer profile.</p>`;
            }
        } catch(e) { showToast("Sync Error"); } 
        finally { btn.innerText = "Sync Profile"; btn.disabled = false; }
    }

    async function generateInvoice() {
        const calc = updateCalculations();
        const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        const balance = calc.finalNet - paid;
        const status = balance <= 0 ? "PAID" : "DUE";
        const invNo = "AC-" + Date.now().toString().slice(-6);
        const mobile = document.getElementById('mobile').value;
        const customer = document.getElementById('customer').value || "Client";

        let rowsHtml = "";
        document.querySelectorAll('.item-row').forEach(row => {
            const n = row.querySelector('.row-name').value;
            const q = row.querySelector('.row-qty').value;
            const r = row.querySelector('.row-rate').value;
            if(n) rowsHtml += `<tr><td><b>${n}</b></td><td>${q}</td><td>₹${r}</td><td style="text-align:right;">₹${(q*r)}</td></tr>`;
        });

        const area = document.getElementById('invoiceArea');
        area.style.display = 'block';
        area.innerHTML = `
            <div id="captureNode" class="invoice-card">
                <div class="inv-badge ${balance <= 0 ? 'badge-paid' : 'badge-due'}">${status}</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:50px;">
                    <div><h2 style="margin:0; font-size:32px; color:#4f46e5;">ALGUM</h2><p style="margin:0; font-weight:800; color:#666;">CREATIONS</p></div>
                    <div style="text-align:right;"><p style="margin:0; font-size:16px; font-weight:900;">#${invNo}</p><p style="margin:5px 0; color:#999;">${new Date().toLocaleDateString()}</p></div>
                </div>

                <div style="margin-bottom:30px;">
                    <p style="margin:0; font-weight:800; font-size:18px;">${customer}</p>
                    <p style="color:#4f46e5; font-weight:700;">+91 ${mobile}</p>
                </div>

                <table class="inv-table">
                    <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th style="text-align:right;">Amount</th></tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <div id="finalQR" style="text-align:center;">
                        ${balance > 0 ? `<p style="font-size:10px; font-weight:800; color:#4f46e5;">SCAN TO PAY BALANCE</p><div id="fQR"></div>` : `<div style="padding:15px; border:2px solid #dcfce7; color:#15803d; font-weight:800;">FULLY PAID</div>`}
                    </div>
                    <table style="width:260px; font-size:14px;">
                        <tr><td style="color:#666;">Subtotal</td><td style="text-align:right;">₹${calc.subtotal}</td></tr>
                        <tr><td style="color:#666;">GST (18%)</td><td style="text-align:right;">₹${calc.totalTax}</td></tr>
                        <tr style="border-top:2px solid #000;"><td style="padding:15px 0; font-weight:900; font-size:24px;">TOTAL</td><td style="text-align:right; font-weight:900; font-size:24px;">₹${calc.finalNet}</td></tr>
                        <tr><td style="color:#10b981;">Paid</td><td style="text-align:right;">₹${paid}</td></tr>
                        <tr style="color:#ef4444; font-weight:800;"><td>Balance</td><td style="text-align:right;">₹${balance}</td></tr>
                    </table>
                </div>
            </div>`;

        if(balance > 0) new QRCode(document.getElementById('fQR'), { text: `upi://pay?pa=${UPI_ID}&pn=Algum&am=${balance}&cu=INR`, width: 110, height: 110 });
        
        document.getElementById('afterButtons').style.display = 'grid';
        area.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadInvoice() {
        html2canvas(document.getElementById("captureNode"), { scale: 3 }).then(canvas => {
            const a = document.createElement("a");
            a.download = `Algum_Invoice.png`; a.href = canvas.toDataURL(); a.click();
        });
    }

    function shareWhatsApp() {
        const mobile = document.getElementById('mobile').value;
        const total = document.getElementById('txtGrandTotal').innerText;
        window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent("🎨 *ALGUM CREATIONS*\nYour invoice for " + total + " is generated.")}`);
    }

    window.onload = init;
</script>
</body>
</html>
